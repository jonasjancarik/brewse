name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: |
          # Remove 'v' prefix if present
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Download tarball and calculate SHA256
        id: sha256
        run: |
          URL="https://files.pythonhosted.org/packages/source/b/brewse/brewse-${{ steps.version.outputs.version }}.tar.gz"
          echo "Downloading from: $URL"
          
          # Download and calculate SHA256
          SHA256=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          
          if [ -z "$SHA256" ]; then
            echo "Error: Failed to download or calculate SHA256"
            exit 1
          fi
          
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Calculated SHA256: $SHA256"

      - name: Checkout homebrew-tap repository
        uses: actions/checkout@v4
        with:
          repository: jonasjancarik/homebrew-tap
          token: ${{ secrets.TAP_UPDATE_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          cd homebrew-tap
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.sha256 }}"
          URL="https://files.pythonhosted.org/packages/source/b/brewse/brewse-${VERSION}.tar.gz"
          
          # Update the formula file
          sed -i "s|url \"https://files.pythonhosted.org/packages/source/./.*/.*\.tar\.gz\"|url \"$URL\"|" Formula/brewse.rb
          sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|" Formula/brewse.rb

          python - <<'PY'
          from pathlib import Path

          formula = Path("Formula/brewse.rb")
          text = formula.read_text()
          install_block = "\n".join([
            "  def install",
            "    virtualenv_install_with_resources",
            "  end",
            "",
          ])
          replacement = "\n".join([
            "  def install",
            "    virtualenv_install_with_resources",
            "  end",
            "",
            "  def post_install",
            "    system \"#{bin}/brewse\", \"--prefetch\"",
            "  rescue",
            "    opoo \"Unable to prefetch package data; Brewse will refresh on first launch.\"",
            "  end",
            "",
            "  service do",
            "    run [opt_bin/\"brewse\", \"--prefetch\"]",
            "    run_type :interval",
            "    interval 86_400",
            "    environment_variables PATH: std_service_path_env",
            "    log_path var/\"log/brewse.log\"",
            "    error_log_path var/\"log/brewse.err.log\"",
            "  end",
            "",
          ])

          if "service do" not in text:
            if install_block not in text:
              raise SystemExit("Formula install block not found; update service insertion.")
            text = text.replace(install_block, replacement)
            formula.write_text(text)
          PY
          
          # Show the diff
          git diff Formula/brewse.rb

      - name: Commit and push changes
        run: |
          cd homebrew-tap
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.sha256 }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Formula/brewse.rb
          git commit -m "Update brewse to v${VERSION}" \
            -m "- Updated tarball URL for version ${VERSION}" \
            -m "- Updated SHA256 hash: ${SHA256}" \
            -m "- Automated update from release workflow"
          
          git push

      - name: Summary
        run: |
          echo "✅ Successfully updated Homebrew tap to version ${{ steps.version.outputs.version }}"
          echo ""
          echo "Users can now update with:"
          echo "  brew update"
          echo "  brew upgrade brewse"
